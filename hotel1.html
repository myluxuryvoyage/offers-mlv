<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Proposition My Luxury Voyage</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #1C2E4A; --gold: #C9A96E; --cream: #F8F6F1; --white: #fff; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background: #E5E3DE; color: var(--navy); }
        .wrapper { max-width: 900px; margin: 0 auto; background: var(--white); }
        header { height: 500px; position: relative; display: flex; align-items: center; justify-content: center; color: white; text-align: center; }
        .hero-bg { position: absolute; top:0; left:0; width:100%; height:100%; background: center/cover no-repeat; z-index: 1; }
        .overlay { position: absolute; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.3); z-index: 2; }
        .hero-content { z-index: 3; padding: 20px; }
        .logo { width: 150px; margin-bottom: 20px; }
        .h-title { font-family: 'Playfair Display', serif; font-size: 45px; margin: 0; }
        .info-bar { display: grid; grid-template-columns: repeat(4, 1fr); background: var(--navy); color: white; padding: 20px; text-align: center; }
        .info-item span { display: block; font-size: 10px; text-transform: uppercase; opacity: 0.7; }
        .main-content { padding: 50px; }
        .room-title { font-family: 'Playfair Display', serif; font-size: 32px; color: var(--gold); }
        .price-box { border: 1px solid #C9A96E; padding: 30px; text-align: center; margin-top: 30px; }
        .btn-wa { background: #25D366; color: white; padding: 15px 40px; text-decoration: none; display: inline-block; font-weight: 600; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="wrapper">
        <header>
            <div id="bg" class="hero-bg" style="background-image: url('https://images.unsplash.com/photo-1566073771259-6a8506099945?auto=format&fit=crop&w=1200')"></div>
            <div class="overlay"></div>
            <div class="hero-content">
                <img src="https://myluxuryvoyage.com/wp-content/uploads/2023/09/MLV-logo-white-menu.png" class="logo">
                <h1 class="h-title" id="hotel-disp">L'Hôtel</h1>
                <p id="client-disp">Proposition Personnalisée</p>
            </div>
        </header>
        <div class="info-bar">
            <div class="info-item"><span>Arrivée</span><strong id="in-disp">-</strong></div>
            <div class="info-item"><span>Départ</span><strong id="out-disp">-</strong></div>
            <div class="info-item"><span>Voyageurs</span><strong id="pax-disp">-</strong></div>
            <div class="info-item"><span>Nuits</span><strong id="night-disp">-</strong></div>
        </div>
        <div class="main-content">
            <h2 class="room-title" id="room-disp">-</h2>
            <div id="specs-disp" style="color:#888; text-transform:uppercase; font-size:12px; margin-bottom:20px;">-</div>
            <p id="notes-disp" style="white-space: pre-line; line-height:1.7;">-</p>
            <div class="price-box">
                <div style="font-size:40px; font-family:'Playfair Display';"><span id="price-disp">0</span>€ <small style="font-size:15px;">/ nuit</small></div>
            </div>
            <div style="text-align:center;">
                <p style="font-size:13px; margin-top:30px;">Services & Extras : <span id="extra-disp">-</span></p>
                <a href="#" class="btn-wa" id="wa-link">VALIDER VIA WHATSAPP</a>
            </div>
        </div>
    </div>
    <script>
        const p = new URLSearchParams(window.location.search);
        document.getElementById('hotel-disp').innerText = p.get('hotel') || "Hôtel";
        document.getElementById('client-disp').innerText = "Proposition pour " + (p.get('client') || "vous");
        document.getElementById('in-disp').innerText = p.get('checkIn') || "-";
        document.getElementById('out-disp').innerText = p.get('checkOut') || "-";
        document.getElementById('pax-disp').innerText = p.get('pax') || "-";
        document.getElementById('night-disp').innerText = p.get('nights') || "-";
        document.getElementById('room-disp').innerText = p.get('room') || "-";
        document.getElementById('specs-disp').innerText = p.get('specs') || "-";
        document.getElementById('notes-disp').innerText = p.get('notes') || "-";
        document.getElementById('price-disp').innerText = p.get('price') || "0";
        document.getElementById('extra-disp').innerText = p.get('extra') || "-";
        if(p.get('img1')) document.getElementById('bg').style.backgroundImage = "url('"+p.get('img1')+"')";
        document.getElementById('wa-link').href = "https://wa.me/33600000000?text=" + encodeURIComponent("Bonjour, je valide l'offre pour " + p.get('hotel'));
    </script>
</body>
</html>
